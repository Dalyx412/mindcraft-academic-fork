<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mindcraft Voice Web</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .ptt-btn {
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .ptt-btn.recording {
      transform: scale(0.97);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.35), 0 0 24px rgba(255, 255, 255, 0.25);
    }
    .ptt-btn.recording::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 1.5rem;
      border: 2px solid rgba(255, 255, 255, 0.45);
      animation: pulse-ring 1.2s ease-out infinite;
      pointer-events: none;
    }
    .ptt-btn-broadcast.recording::after {
      border-radius: 1rem;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 0.9; }
      100% { transform: scale(1.08); opacity: 0; }
    }
    .mic-denied { filter: grayscale(1); opacity: 0.55; }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-white flex flex-col">
  <header class="px-4 pt-5 pb-2 text-center">
    <h1 id="i18n-title" class="text-xl font-semibold tracking-tight"></h1>
    <p id="i18n-subtitle" class="text-slate-400 text-sm mt-1"></p>
  </header>

  <section id="shareSection" class="px-4 py-3 max-w-lg mx-auto w-full">
    <div class="rounded-2xl bg-slate-800/80 border border-slate-700 p-4 flex flex-col items-center gap-3">
      <p id="i18n-shareScanHint" class="text-xs text-slate-400"></p>
      <img
        id="shareQr"
        class="rounded-lg bg-white p-1 w-32 h-32 object-contain"
        width="128"
        height="128"
        alt=""
      />
      <a
        id="shareLink"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        class="text-xs text-blue-400 break-all text-center hover:underline max-w-full"
      ></a>
      <p id="shareHint" class="text-[11px] text-slate-500 text-center"></p>
    </div>
  </section>

  <div class="px-4 py-1 flex flex-wrap justify-center items-center gap-x-4 gap-y-2 text-sm max-w-lg mx-auto w-full">
    <div class="flex items-center gap-2">
      <label id="i18n-langLabel" for="langSelect" class="text-slate-400"></label>
      <select id="langSelect" class="bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm">
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="flex items-center gap-2">
      <label id="i18n-recordModeLabel" for="recordModeSelect" class="text-slate-400"></label>
      <select id="recordModeSelect" class="bg-slate-800 border border-slate-600 rounded px-2 py-1 text-sm">
        <option value="hold"></option>
        <option value="toggle"></option>
      </select>
    </div>
  </div>

  <div class="px-4 max-w-lg mx-auto w-full">
    <button
      id="btnEnableMic"
      type="button"
      class="hidden w-full mb-4 py-3 rounded-xl bg-amber-600 hover:bg-amber-500 font-semibold text-sm shadow-lg"
    ></button>
  </div>

  <main id="agentButtons" class="flex-1 flex flex-col justify-center gap-5 px-4 pb-6 max-w-lg mx-auto w-full">
    <button
      id="btnBroadcast"
      type="button"
      class="ptt-btn ptt-btn-broadcast relative w-full min-h-[11vh] rounded-2xl bg-gradient-to-br from-violet-500 to-violet-700 font-semibold text-lg shadow-md shadow-violet-900/30 flex flex-col items-center justify-center gap-1"
      data-agent="broadcast"
    >
      <span class="text-2xl">📢</span>
      <span id="i18n-broadcast"></span>
      <span id="i18n-broadcastHint" class="text-xs font-normal text-violet-100/80"></span>
    </button>
  </main>

  <footer class="px-4 pb-6 text-center">
    <p id="status" class="text-sm text-slate-400 min-h-[2.5rem]"></p>
    <p id="wsState" class="text-xs text-slate-500 mt-1"></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
